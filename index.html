<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloody Mary Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:ital,wght@0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #ec1c24;
    --red-dk: #b4121a;
    --blue:   #1d4ed8;
    --blue-dk:#163fab;
    --yellow: #ffd400;
    --green:  #16a34a;
    --pink:   #ff5ca8;
    --orange: #ff7a18;
    --cream:  #fff8e7;
    --ink:    #15110d;
    --paper:  #fffdf6;
    --line:   #15110d;
    --shadow: 5px 5px 0 var(--ink);
    --shadow-lg: 8px 8px 0 var(--ink);
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "Archivo", system-ui, sans-serif;
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-color: var(--cream);
    background-image:
      radial-gradient(var(--red) 1.5px, transparent 1.6px),
      radial-gradient(var(--blue) 1.5px, transparent 1.6px),
      linear-gradient(rgba(21,17,13,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(21,17,13,.05) 1px, transparent 1px);
    background-size: 64px 64px, 64px 64px, 26px 26px, 26px 26px;
    background-position: 0 0, 32px 32px, 0 0, 0 0;
  }
  @media (prefers-reduced-motion: no-preference) {
    .wobble { animation: wob 6s ease-in-out infinite; }
    @keyframes wob { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
  }

  .wrap { max-width: 820px; margin: 0 auto; padding: 24px 18px 100px; position: relative; }

  .sticker-field { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .sticker-field span { position: absolute; display: block; }
  .sticker-field svg { display: block; }
  .wrap > *:not(.sticker-field) { position: relative; z-index: 1; }

  header.app {
    background: var(--yellow);
    border: 4px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow-lg);
    padding: 26px 24px 28px;
    margin-bottom: 30px;
    position: relative;
    display: flex; align-items: center; justify-content: space-between;
    gap: 18px; flex-wrap: wrap;
  }
  .title { display: flex; align-items: center; gap: 16px; }
  .title .glass {
    width: 64px; height: 64px; flex-shrink: 0;
    background: var(--red); border: 4px solid var(--line); border-radius: 50%;
    box-shadow: 3px 3px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-8deg);
  }
  .title .glass svg { width: 38px; height: 38px; }
  h1 {
    font-family: "Archivo Black", sans-serif;
    font-size: clamp(30px, 7vw, 52px);
    margin: 0; line-height: .92; letter-spacing: -.02em;
    color: var(--red);
    text-transform: uppercase;
    text-shadow: 3px 3px 0 var(--line);
    transform: rotate(-1.5deg);
  }
  .subtitle {
    display: inline-block;
    font-weight: 800; font-size: 13px; letter-spacing: .03em;
    margin: 8px 0 0; padding: 4px 12px;
    background: var(--blue); color: #fff;
    border: 3px solid var(--line); border-radius: 999px;
    transform: rotate(1.5deg);
    text-transform: uppercase;
  }

  button {
    font-family: "Archivo Black", sans-serif;
    font-size: 14px; cursor: pointer;
    border: 3px solid var(--line); border-radius: 12px;
    background: #fff; color: var(--ink);
    padding: 11px 16px; text-transform: uppercase; letter-spacing: .02em;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  button:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--ink); }
  button:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--ink); }
  button:focus-visible { outline: 3px dashed var(--blue); outline-offset: 3px; }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-add {
    background: var(--green); color: #fff; font-size: 15px;
    padding: 13px 20px; transform: rotate(-2deg);
  }
  .btn-add:hover { transform: rotate(-2deg) translate(-1px,-1px); }
  .btn-ghost {
    background: #fff; box-shadow: 3px 3px 0 var(--ink);
    padding: 8px 13px; font-size: 12px;
  }
  .btn-del { background: var(--red); color: #fff; box-shadow: 3px 3px 0 var(--ink); padding: 8px 13px; font-size: 12px; }

  .toolbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin: 0 0 26px; padding: 14px 16px;
    background: var(--pink);
    border: 4px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow);
  }
  .toolbar label {
    font-family: "Archivo Black", sans-serif;
    font-size: 12px; text-transform: uppercase; color: #fff;
    text-shadow: 1.5px 1.5px 0 var(--line);
    margin-right: 2px;
  }
  select, input[type=text], input[type=search], textarea {
    font-family: "Archivo", sans-serif; font-weight: 600;
    color: var(--ink); background: #fff;
    border: 3px solid var(--line); border-radius: 10px; padding: 9px 12px;
    width: 100%;
  }
  select { width: auto; padding-right: 30px; cursor: pointer; }
  input:focus, select:focus, textarea:focus {
    outline: none; box-shadow: 3px 3px 0 var(--blue);
  }
  .count {
    margin-left: auto;
    font-family: "Archivo Black", sans-serif; font-size: 13px;
    color: #fff; background: var(--ink); padding: 5px 12px; border-radius: 999px;
    border: 2px solid var(--line);
  }
  .search { flex: 1; min-width: 150px; max-width: 260px; }

  .card {
    background: var(--paper);
    border: 4px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow-lg);
    padding: 20px 22px; margin-bottom: 26px;
    position: relative;
  }
  .card-accent { position: absolute; top: -18px; right: -14px; width: 54px; height: 54px; transform: rotate(12deg); overflow: visible; }
  .card::before {
    content: ""; position: absolute; top: -12px; left: 24px;
    width: 64px; height: 22px; background: rgba(255,255,255,.55);
    border: 2px solid rgba(21,17,13,.35); border-radius: 3px;
    transform: rotate(-4deg);
  }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
  .card-name {
    font-family: "Archivo Black", sans-serif;
    font-size: 23px; margin: 0; line-height: 1.02; letter-spacing: -.01em;
    color: var(--blue); text-transform: uppercase;
  }
  .card-source { font-weight: 600; font-size: 13.5px; margin: 4px 0 0; color: var(--ink); opacity: .75; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 0; }
  .tag {
    font-family: "Archivo Black", sans-serif;
    font-size: 12px; padding: 4px 12px; border-radius: 999px;
    border: 2.5px solid var(--line);
    display: inline-flex; align-items: center; gap: 5px;
    text-transform: uppercase;
  }
  .sec-label {
    font-family: "Archivo Black", sans-serif;
    font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: #fff; background: var(--green);
    display: inline-block; padding: 2px 10px; border: 2px solid var(--line);
    border-radius: 6px; margin: 16px 0 8px; transform: rotate(-1deg);
  }
  .card ul { margin: 0; padding-left: 22px; font-size: 15px; font-weight: 600; }
  .card ul li { margin: 3px 0; }
  .card ul li::marker { color: var(--red); }
  .card .notes { font-size: 15px; font-weight: 600; margin: 0; white-space: pre-wrap; }
  .card-foot {
    display: flex; gap: 10px; margin-top: 18px; padding-top: 14px;
    border-top: 3px dashed var(--line);
  }

  .stars { white-space: nowrap; display: inline-flex; gap: 3px; }
  .star {
    cursor: pointer; font-size: 25px; line-height: 1; user-select: none;
    color: #fff; -webkit-text-stroke: 2px var(--line); transition: transform .1s;
  }
  .star.on { color: var(--yellow); }
  .star:hover { transform: scale(1.25) rotate(-8deg); }

  .field { margin-bottom: 15px; }
  .field label {
    display: block; font-family: "Archivo Black", sans-serif;
    font-size: 12px; text-transform: uppercase; margin-bottom: 6px; color: var(--ink);
  }
  .row { display: flex; gap: 14px; }
  .row > .field { flex: 1; }
  .form-actions { display: flex; gap: 10px; margin-top: 8px; }

  .empty {
    text-align: center; padding: 50px 24px;
    background: var(--paper); border: 4px dashed var(--line);
    border-radius: 18px;
  }
  .empty .big { width: 84px; height: 84px; margin: 0 auto 6px; }
  .empty .big svg { width: 100%; height: 100%; }
  .empty p {
    margin: 14px 0 0; font-family: "Archivo Black", sans-serif;
    font-size: 18px; text-transform: uppercase; color: var(--blue);
  }

  .banner {
    border: 3px solid var(--line); border-radius: 12px;
    padding: 12px 16px; font-weight: 600; font-size: 14px; margin-bottom: 18px;
    box-shadow: 4px 4px 0 var(--ink); display: none;
  }
  .banner.show { display: block; }
  .banner.err { background: var(--red); color: #fff; }
  .banner.info { background: var(--green); color: #fff; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(21,17,13,.55);
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; overflow-y: auto; z-index: 50;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--cream); border: 5px solid var(--line); border-radius: 22px;
    box-shadow: 10px 10px 0 var(--ink);
    width: 100%; max-width: 540px; padding: 26px;
  }
  .modal h2 {
    font-family: "Archivo Black", sans-serif;
    margin: 0 0 18px; font-size: 26px; text-transform: uppercase;
    color: var(--red); text-shadow: 2px 2px 0 var(--line); transform: rotate(-1deg);
  }

  @media (max-width: 520px) {
    .row { flex-direction: column; gap: 0; }
    header.app { flex-direction: column; align-items: flex-start; }
    .btn-add { align-self: stretch; text-align: center; }
  }

  /* ---------- TAG CHIPS ---------- */
  .chip {
    font-family: "Archivo Black", sans-serif;
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    border: 2.5px solid var(--line); display: inline-flex; align-items: center; gap: 4px;
    text-transform: uppercase; cursor: pointer; line-height: 1.4;
  }
  .chip.pick { opacity: .45; }
  .chip.pick.on { opacity: 1; box-shadow: 2px 2px 0 var(--ink); }

  /* ---------- RATING CONTROL ---------- */
  .rate-wrap { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .rate-num {
    font-family: "Archivo Black", sans-serif; font-size: 26px; color: var(--red);
    background: var(--yellow); border: 3px solid var(--line); border-radius: 10px;
    padding: 2px 12px; box-shadow: 3px 3px 0 var(--ink); min-width: 64px; text-align: center;
  }
  .rate-num small { font-size: 13px; color: var(--ink); }
  input[type=range] {
    -webkit-appearance: none; appearance: none; height: 14px; padding: 0;
    background: #fff; border: 3px solid var(--line); border-radius: 999px;
    width: 100%; min-width: 160px; box-shadow: none; cursor: pointer; flex: 1;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
    background: var(--red); border: 3px solid var(--line); box-shadow: 2px 2px 0 var(--ink); cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--red); border: 3px solid var(--line); cursor: pointer;
  }

  /* ---------- RATING BADGE (cards) ---------- */
  .score {
    font-family: "Archivo Black", sans-serif; white-space: nowrap;
    background: var(--yellow); border: 3px solid var(--line); border-radius: 12px;
    padding: 4px 12px; box-shadow: 3px 3px 0 var(--ink); transform: rotate(3deg);
    font-size: 20px; color: var(--red);
  }
  .score small { font-size: 11px; color: var(--ink); }

  /* ---------- PHOTO ---------- */
  .photo-thumb {
    width: 100%; max-height: 360px; object-fit: cover;
    border: 4px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    margin: 4px 0 6px; display: block;
  }
  .card .photo-thumb { max-height: 200px; }

  .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 0; }
  .meta-pill {
    font-weight: 800; font-size: 12px; padding: 4px 11px; border-radius: 999px;
    border: 2.5px solid var(--line); background: #fff; display: inline-flex; gap: 5px; align-items: center;
  }

  /* ---------- DETAIL VIEW ---------- */
  .back-btn { margin-bottom: 20px; background: var(--blue); color: #fff; transform: rotate(-1deg); }
  .detail {
    background: var(--paper); border: 4px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow-lg); padding: 26px 26px 30px; position: relative;
  }
  .detail h1.detail-name {
    font-family: "Archivo Black", sans-serif; color: var(--blue);
    font-size: clamp(26px, 6vw, 40px); line-height: 1; margin: 0 0 4px;
    text-transform: uppercase; transform: none; text-shadow: none;
  }
  .detail .by { font-weight: 600; opacity: .75; margin: 0 0 16px; }
  .section-title {
    font-family: "Archivo Black", sans-serif; text-transform: uppercase;
    font-size: 22px; color: var(--ink); margin: 26px 0 10px;
    display: inline-block; background: var(--yellow); padding: 2px 12px;
    border: 3px solid var(--line); border-radius: 8px; transform: rotate(-1deg);
  }
  .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-top: 8px; }
  .related-card {
    background: #fff; border: 3px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); padding: 14px; cursor: pointer; text-align: left;
    font-family: "Archivo", sans-serif; transition: transform .08s, box-shadow .08s;
  }
  .related-card:hover { transform: translate(-1px,-1px); box-shadow: 6px 6px 0 var(--ink); }
  .related-card .rc-name { font-family: "Archivo Black", sans-serif; text-transform: uppercase; color: var(--blue); font-size: 15px; margin: 0 0 6px; }
  .related-card img { width: 100%; height: 90px; object-fit: cover; border: 2.5px solid var(--line); border-radius: 8px; margin-bottom: 8px; }

  /* ---------- TAG MANAGER ---------- */
  .tag-mgr-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; padding: 10px; border: 3px solid var(--line); border-radius: 12px; background: #fff; }
  .tag-mgr-row .grow { flex: 1; min-width: 120px; }
  input[type=color] {
    -webkit-appearance: none; appearance: none; width: 46px; height: 40px; padding: 0;
    border: 3px solid var(--line); border-radius: 10px; background: #fff; cursor: pointer;
  }
  input[type=color]::-webkit-color-swatch-wrapper { padding: 3px; }
  input[type=color]::-webkit-color-swatch { border: none; border-radius: 6px; }
  .emoji-btn { font-size: 22px; width: 46px; height: 40px; padding: 0; background: #fff; }
  .emoji-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
    border: 3px solid var(--line); border-radius: 12px; padding: 8px; background: var(--cream);
    margin-top: 6px; max-height: 180px; overflow-y: auto;
  }
  .emoji-grid button { font-size: 20px; padding: 6px; box-shadow: none; border: 2px solid transparent; background: transparent; }
  .emoji-grid button:hover { border-color: var(--line); background: #fff; transform: none; }
  .modal.wide { max-width: 600px; }
  .muted { font-weight: 600; opacity: .7; font-size: 14px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -3px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="sticker-field" id="stickerField" aria-hidden="true"></div>

  <header class="app">
    <div class="title">
      <span class="glass wobble">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 14h24l-3 22a3 3 0 0 1-3 2.6H18A3 3 0 0 1 15 36L12 14Z" fill="#ec1c24" stroke="#15110d" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M12 14h24l-1 7H13l-1-7Z" fill="#b4121a" stroke="#15110d" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M30 13c0-6 4-9 8-10" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
          <path d="M33 7l5-4M35 11l6-2" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
          <circle cx="20" cy="30" r="2" fill="#ffd400" stroke="#15110d" stroke-width="1.5"/>
          <circle cx="26" cy="26" r="1.6" fill="#ffd400" stroke="#15110d" stroke-width="1.5"/>
        </svg>
      </span>
      <div>
        <h1><a href="#/" style="color:inherit;text-decoration:none">Bloody Mary<br>Recipe Box</a></h1>
        <span class="subtitle">Our shared stash &amp; rankings</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-ghost" id="tagsBtn" style="align-self:center">🏷 Tags</button>
      <button class="btn-add" id="addBtn">+ Add recipe</button>
    </div>
  </header>

  <div class="banner err" id="errBanner"></div>
  <div class="banner info" id="infoBanner"></div>

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="toolbar">
      <label for="sort">Sort</label>
      <select id="sort">
        <option value="rating">Highest rated</option>
        <option value="name">Name (A–Z)</option>
        <option value="recent">Recently added</option>
      </select>
      <input type="search" class="search" id="search" placeholder="Search recipes…" />
      <span class="count" id="count"></span>
    </div>
    <div id="filterTags" class="tags" style="margin-bottom:20px"></div>
    <div id="list"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" style="display:none"></div>
</div>

<!-- RECIPE MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal wide">
    <h2 id="modalTitle">Add recipe</h2>
    <div class="field">
      <label for="f-name">Recipe name *</label>
      <input type="text" id="f-name" placeholder="e.g. Smoky chipotle mary" />
    </div>
    <div class="row">
      <div class="field">
        <label for="f-source">Source / who made it</label>
        <input type="text" id="f-source" placeholder="e.g. The Wharf, or Mum" />
      </div>
      <div class="field">
        <label for="f-spice">Spice level</label>
        <select id="f-spice" style="width:100%">
          <option value="">—</option>
          <option>Mild</option>
          <option>Medium</option>
          <option>Hot</option>
          <option>Inferno</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="f-date">Date</label>
        <input type="date" id="f-date" style="width:100%" />
      </div>
      <div class="field">
        <label for="f-location">Location</label>
        <input type="text" id="f-location" placeholder="e.g. Brighton, or home" />
      </div>
    </div>
    <div class="field">
      <label for="f-ingredients">Ingredients (one per line)</label>
      <textarea id="f-ingredients" rows="4" placeholder="50ml vodka&#10;100ml tomato juice&#10;Dash of Worcestershire…"></textarea>
    </div>
    <div class="field">
      <label for="f-notes">Notes / garnish</label>
      <textarea id="f-notes" rows="2" placeholder="Garnish, tweaks, verdict…"></textarea>
    </div>
    <div class="field">
      <label for="f-photo">Photo</label>
      <input type="file" id="f-photo" accept="image/*" style="width:100%" />
      <div id="photoPreviewWrap" style="margin-top:8px"></div>
    </div>
    <div class="field">
      <label>Tags</label>
      <div id="f-tags" class="tags"></div>
    </div>
    <div class="field">
      <label>Rating (0–10)</label>
      <div class="rate-wrap">
        <input type="range" id="f-rating" min="0" max="10" step="0.5" value="0" />
        <span class="rate-num"><span id="f-rating-out">0</span><small>/10</small></span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="saveBtn">Save</button>
      <button id="cancelBtn">Cancel</button>
    </div>
  </div>
</div>

<!-- TAG MANAGER MODAL -->
<div class="modal-bg" id="tagModalBg">
  <div class="modal wide">
    <h2>Manage tags</h2>
    <p class="muted" style="margin-top:-8px">Make tags with their own colour &amp; emoji. Use them on any recipe.</p>
    <div id="tagList" style="margin:16px 0"></div>
    <div style="border-top:3px dashed var(--line);padding-top:16px">
      <label class="field" style="display:block">New tag</label>
      <div class="tag-mgr-row">
        <button class="emoji-btn" id="newEmojiBtn" type="button">🍅</button>
        <input type="text" id="newTagName" class="grow" placeholder="Tag name e.g. Spicy" />
        <input type="color" id="newTagColor" value="#ec1c24" />
        <button class="btn-primary" id="addTagBtn" type="button">Add</button>
      </div>
      <div id="emojiPickerWrap"></div>
    </div>
    <div class="form-actions" style="margin-top:18px">
      <button id="tagDoneBtn">Done</button>
    </div>
  </div>
</div>
<script>
/* ============================================================
   CONFIG — paste your Supabase values here (see SETUP.md)
   ============================================================ */
const SUPABASE_URL = "https://zbwydzxeadxjlzpjntpu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6oLX612RoEj_T9o5keYEDw_HOrKc8fh";
const PHOTO_BUCKET = "recipe-photos";
/* ============================================================ */

const cleanUrl = () => SUPABASE_URL.trim().replace(/\/+$/, "");
const restBase = () => `${cleanUrl()}/rest/v1`;
const headers = () => ({
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json"
});

let recipes = [];
let tags = [];                 // {id,name,color,emoji}
let editingId = null;
let formRating = 0;
let formTagIds = [];           // tag ids selected in recipe form
let formPhotoUrl = null;       // existing/uploaded photo url
let formPhotoFile = null;      // pending file
let activeFilterTag = null;    // tag id to filter list by
let newTagEmoji = "🍅";

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function showErr(msg){ const b=$("errBanner"); b.textContent=msg; b.classList.add("show"); }
function hideErr(){ $("errBanner").classList.remove("show"); }
function showInfo(msg){ const b=$("infoBanner"); b.textContent=msg; b.classList.add("show"); setTimeout(()=>b.classList.remove("show"), 3000); }

function configured(){
  return SUPABASE_URL.startsWith("http") && !SUPABASE_ANON_KEY.startsWith("PASTE_");
}

async function api(method, table, query="", body=null, extraHeaders={}){
  const opts = { method, headers: { ...headers(), ...extraHeaders } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${restBase()}/${table}${query}`, opts);
  if (!res.ok){ throw new Error(`${res.status}: ${await res.text()}`); }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

/* ---------- Tag colour helpers ---------- */
function textOn(hex){
  // pick black or white text for contrast against a hex bg
  const h = (hex||"#cccccc").replace("#","");
  const r=parseInt(h.substr(0,2),16), g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
  const lum = (0.299*r + 0.587*g + 0.114*b)/255;
  return lum > 0.6 ? "#15110d" : "#ffffff";
}
function tagById(id){ return tags.find(t => String(t.id)===String(id)); }
function chipHTML(tag, extraClass="", extraAttr=""){
  if (!tag) return "";
  return `<span class="chip ${extraClass}" ${extraAttr} style="background:${tag.color};color:${textOn(tag.color)};border-color:var(--line)">${tag.emoji||""} ${esc(tag.name)}</span>`;
}

/* ---------- Score badge ---------- */
function scoreBadge(rating){
  const v = (rating==null) ? 0 : rating;
  return `<span class="score">${fmtScore(v)}<small>/10</small></span>`;
}
function fmtScore(v){ return (Math.round(v*2)/2).toString(); }

/* ---------- Load everything ---------- */
async function loadAll(){
  if (!configured()){
    showErr("Not connected yet. Open SETUP.md and paste your Supabase URL and key into index.html.");
    route();
    return;
  }
  try {
    hideErr();
    const [rec, tg] = await Promise.all([
      api("GET","recipes","?select=*,recipe_tags(tag_id)"),
      api("GET","tags","?select=*&order=name.asc")
    ]);
    recipes = (rec||[]).map(r => ({...r, tagIds: (r.recipe_tags||[]).map(x=>x.tag_id)}));
    tags = tg||[];
    route();
  } catch (e){
    showErr("Couldn't load. Check your setup, or the project may be paused — open the Supabase dashboard to resume it. (" + e.message + ")");
    route();
  }
}

const SPICE_STYLE = {
  Mild:    "background:#bff0c8;color:#0f5132",
  Medium:  "background:#ffd400;color:#5c4400",
  Hot:     "background:#ff7a18;color:#5c2700",
  Inferno: "background:#ec1c24;color:#fff"
};
function spiceIcon(level){
  const n = {Mild:1, Medium:2, Hot:3, Inferno:4}[level] || 0;
  return "🌶".repeat(n);
}

/* ================= ROUTING ================= */
function route(){
  const hash = location.hash || "#/";
  const m = hash.match(/^#\/recipe\/(.+)$/);
  if (m){
    showDetail(m[1]);
  } else {
    $("listView").style.display = "";
    $("detailView").style.display = "none";
    renderList();
  }
}
window.addEventListener("hashchange", route);

/* ================= LIST VIEW ================= */
function renderFilterTags(){
  const box = $("filterTags");
  if (!tags.length){ box.innerHTML = ""; return; }
  box.innerHTML = `<span class="muted" style="align-self:center;margin-right:4px">Filter:</span>` +
    tags.map(t => chipHTML(t, "pick " + (activeFilterTag===t.id?"on":""), `data-filter="${t.id}"`)).join("") +
    (activeFilterTag ? `<button class="btn-ghost" id="clearFilter" style="padding:3px 10px;font-size:11px">clear ✕</button>` : "");
  box.querySelectorAll("[data-filter]").forEach(c => c.onclick = () => {
    activeFilterTag = (activeFilterTag===c.dataset.filter*1 || activeFilterTag===c.dataset.filter) ? null : (tagById(c.dataset.filter)?.id ?? null);
    renderList();
  });
  const cf = $("clearFilter"); if (cf) cf.onclick = () => { activeFilterTag=null; renderList(); };
}

function renderList(){
  renderFilterTags();
  const sort = $("sort").value;
  const q = $("search").value.trim().toLowerCase();
  let view = recipes.slice();

  if (q){
    view = view.filter(r =>
      (r.name||"").toLowerCase().includes(q) ||
      (r.source||"").toLowerCase().includes(q) ||
      (r.location||"").toLowerCase().includes(q) ||
      (r.ingredients||"").toLowerCase().includes(q)
    );
  }
  if (activeFilterTag != null){
    view = view.filter(r => (r.tagIds||[]).map(String).includes(String(activeFilterTag)));
  }
  if (sort==="rating") view.sort((a,b)=>(b.rating||0)-(a.rating||0) || (b.created_at||"").localeCompare(a.created_at||""));
  else if (sort==="name") view.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  else view.sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));

  $("count").textContent = recipes.length + (recipes.length===1?" recipe":" recipes");

  const list = $("list");
  if (recipes.length===0){
    list.innerHTML = `<div class="empty"><div class="big">${GLASS_SVG}</div><p>No recipes yet —<br>add your first one!</p></div>`;
    return;
  }
  if (view.length===0){
    list.innerHTML = `<div class="empty"><div class="big">${GLASS_SVG}</div><p>Nothing matches</p></div>`;
    return;
  }

  list.innerHTML = view.map((r, idx) => {
    const spice = r.spice ? `<span class="tag" style="${SPICE_STYLE[r.spice]||''}">${spiceIcon(r.spice)} ${esc(r.spice)}</span>` : "";
    const tagChips = (r.tagIds||[]).map(id => chipHTML(tagById(id))).join("");
    const tilt = [-1.4, 0.8, -0.7, 1.3, -1.1][idx % 5];
    const photo = r.photo_url ? `<img class="photo-thumb" src="${esc(r.photo_url)}" alt="" loading="lazy">` : "";
    const meta = [
      r.location ? `<span class="meta-pill">📍 ${esc(r.location)}</span>` : "",
      r.date ? `<span class="meta-pill">📅 ${esc(formatDate(r.date))}</span>` : ""
    ].join("");
    return `<div class="card" style="transform:rotate(${tilt}deg)">
      ${cardAccent(idx)}
      <div class="card-head">
        <div>
          <p class="card-name"><a href="#/recipe/${r.id}" style="color:inherit;text-decoration:none">${esc(r.name||"Untitled")}</a></p>
          ${r.source?`<p class="card-source">${esc(r.source)}</p>`:""}
        </div>
        ${scoreBadge(r.rating)}
      </div>
      ${photo}
      ${(spice||tagChips)?`<div class="tags">${spice}${tagChips}</div>`:""}
      ${meta?`<div class="meta-row">${meta}</div>`:""}
      <div class="card-foot">
        <button class="btn-ghost" data-open="${r.id}">👁 Open</button>
        <button class="btn-ghost" data-edit="${r.id}">✎ Edit</button>
        <button class="btn-del" data-del="${r.id}">✕ Delete</button>
      </div>
    </div>`;
  }).join("");

  list.querySelectorAll("[data-open]").forEach(b => b.onclick = () => location.hash = `#/recipe/${b.dataset.open}`);
  list.querySelectorAll("[data-del]").forEach(b => b.onclick = () => delRecipe(b.dataset.del));
  list.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => startEdit(b.dataset.edit));
}

function formatDate(d){
  if (!d) return "";
  try { return new Date(d+"T00:00:00").toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"}); }
  catch { return d; }
}

/* ================= DETAIL VIEW ================= */
function relatedFor(r){
  const myTags = new Set((r.tagIds||[]).map(String));
  if (!myTags.size) return [];
  const pool = recipes.filter(o => String(o.id)!==String(r.id) && (o.tagIds||[]).some(t => myTags.has(String(t))));
  // shuffle (Fisher–Yates) and take 3
  for (let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0,3);
}

function showDetail(id){
  const r = recipes.find(x => String(x.id)===String(id));
  $("listView").style.display = "none";
  const view = $("detailView");
  view.style.display = "";
  if (!r){
    view.innerHTML = `<button class="back-btn" onclick="location.hash='#/'">← Back</button>
      <div class="empty"><div class="big">${GLASS_SVG}</div><p>Recipe not found</p></div>`;
    return;
  }
  const ing = (r.ingredients||"").split("\n").map(s=>s.trim()).filter(Boolean);
  const ingHTML = ing.length ? `<div class="section-title">Ingredients</div><ul>${ing.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>` : "";
  const notesHTML = r.notes ? `<div class="section-title">Notes</div><p class="notes">${esc(r.notes)}</p>` : "";
  const spice = r.spice ? `<span class="tag" style="${SPICE_STYLE[r.spice]||''}">${spiceIcon(r.spice)} ${esc(r.spice)}</span>` : "";
  const tagChips = (r.tagIds||[]).map(tid => chipHTML(tagById(tid))).join("");
  const photo = r.photo_url ? `<img class="photo-thumb" src="${esc(r.photo_url)}" alt="">` : "";
  const meta = [
    r.location ? `<span class="meta-pill">📍 ${esc(r.location)}</span>` : "",
    r.date ? `<span class="meta-pill">📅 ${esc(formatDate(r.date))}</span>` : ""
  ].join("");

  const related = relatedFor(r);
  const relHTML = related.length ? `
    <div class="section-title">You might also like</div>
    <div class="related-grid">
      ${related.map(rr => `
        <button class="related-card" onclick="location.hash='#/recipe/${rr.id}'">
          ${rr.photo_url?`<img src="${esc(rr.photo_url)}" alt="">`:""}
          <p class="rc-name">${esc(rr.name)}</p>
          <div>${scoreBadge(rr.rating)}</div>
        </button>`).join("")}
    </div>` :
    `<div class="section-title">You might also like</div><p class="muted">Add some shared tags to see related recipes.</p>`;

  view.innerHTML = `
    <button class="back-btn" onclick="location.hash='#/'">← All recipes</button>
    <div class="detail">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
        <div>
          <h1 class="detail-name">${esc(r.name||"Untitled")}</h1>
          ${r.source?`<p class="by">made by ${esc(r.source)}</p>`:""}
        </div>
        ${scoreBadge(r.rating)}
      </div>
      ${photo}
      ${(spice||tagChips)?`<div class="tags" style="margin-top:12px">${spice}${tagChips}</div>`:""}
      ${meta?`<div class="meta-row">${meta}</div>`:""}
      ${ingHTML}
      ${notesHTML}
      <div class="card-foot" style="margin-top:24px">
        <button class="btn-ghost" onclick="startEdit('${r.id}')">✎ Edit</button>
        <button class="btn-del" onclick="delRecipe('${r.id}')">✕ Delete</button>
      </div>
      ${relHTML}
    </div>`;
  window.scrollTo(0,0);
}

/* ================= RECIPE FORM ================= */
function renderFormRating(){
  $("f-rating").value = formRating;
  $("f-rating-out").textContent = fmtScore(formRating);
}
function renderFormTags(){
  const box = $("f-tags");
  if (!tags.length){ box.innerHTML = `<span class="muted">No tags yet — add some via the 🏷 Tags button.</span>`; return; }
  box.innerHTML = tags.map(t => {
    const on = formTagIds.map(String).includes(String(t.id));
    return chipHTML(t, "pick " + (on?"on":""), `data-tag="${t.id}"`);
  }).join("");
  box.querySelectorAll("[data-tag]").forEach(c => c.onclick = () => {
    const id = c.dataset.tag;
    const sid = tags.find(t=>String(t.id)===String(id)).id;
    if (formTagIds.map(String).includes(String(sid))) formTagIds = formTagIds.filter(x=>String(x)!==String(sid));
    else formTagIds.push(sid);
    renderFormTags();
  });
}
function renderPhotoPreview(){
  const wrap = $("photoPreviewWrap");
  const url = formPhotoFile ? URL.createObjectURL(formPhotoFile) : formPhotoUrl;
  if (!url){ wrap.innerHTML = ""; return; }
  wrap.innerHTML = `<img class="photo-thumb" src="${url}" alt="" style="max-height:160px">
    <button class="btn-ghost" id="removePhoto" type="button" style="font-size:11px">remove photo ✕</button>`;
  $("removePhoto").onclick = () => { formPhotoFile=null; formPhotoUrl=null; $("f-photo").value=""; renderPhotoPreview(); };
}

function openModal(){ $("modalBg").classList.add("show"); }
function closeModal(){ $("modalBg").classList.remove("show"); resetForm(); }
function resetForm(){
  editingId = null; formRating = 0; formTagIds = []; formPhotoUrl=null; formPhotoFile=null;
  ["f-name","f-source","f-ingredients","f-notes","f-location","f-date"].forEach(i => $(i).value = "");
  $("f-spice").value = ""; $("f-photo").value = "";
  $("modalTitle").textContent = "Add recipe";
  renderFormRating(); renderFormTags(); renderPhotoPreview();
}
function startEdit(id){
  const r = recipes.find(x => String(x.id)===String(id));
  if (!r) return;
  editingId = id;
  formRating = r.rating||0;
  formTagIds = (r.tagIds||[]).slice();
  formPhotoUrl = r.photo_url||null; formPhotoFile=null;
  $("f-name").value = r.name||"";
  $("f-source").value = r.source||"";
  $("f-spice").value = r.spice||"";
  $("f-location").value = r.location||"";
  $("f-date").value = r.date||"";
  $("f-ingredients").value = r.ingredients||"";
  $("f-notes").value = r.notes||"";
  $("modalTitle").textContent = "Edit recipe";
  renderFormRating(); renderFormTags(); renderPhotoPreview();
  openModal();
}

/* ---------- Photo upload to Supabase Storage ---------- */
async function uploadPhoto(file){
  const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
  const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const res = await fetch(`${cleanUrl()}/storage/v1/object/${PHOTO_BUCKET}/${path}`, {
    method: "POST",
    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": file.type || "image/jpeg" },
    body: file
  });
  if (!res.ok) throw new Error(`Photo upload failed: ${res.status} ${await res.text()}`);
  return `${cleanUrl()}/storage/v1/object/public/${PHOTO_BUCKET}/${path}`;
}

/* ---------- Save recipe + its tag links ---------- */
async function saveRecipe(){
  const name = $("f-name").value.trim();
  if (!name){ $("f-name").focus(); return; }
  const saveBtn = $("saveBtn");
  const orig = saveBtn.innerHTML;
  saveBtn.disabled = true; saveBtn.innerHTML = `<span class="spinner"></span> Saving`;
  try {
    if (formPhotoFile){ formPhotoUrl = await uploadPhoto(formPhotoFile); }
    const data = {
      name,
      source: $("f-source").value.trim() || null,
      spice: $("f-spice").value || null,
      location: $("f-location").value.trim() || null,
      date: $("f-date").value || null,
      ingredients: $("f-ingredients").value.trim() || null,
      notes: $("f-notes").value.trim() || null,
      rating: formRating,
      photo_url: formPhotoUrl || null
    };
    let recId = editingId;
    if (editingId){
      await api("PATCH","recipes",`?id=eq.${editingId}`, data);
    } else {
      const created = await api("POST","recipes","", data, { "Prefer": "return=representation" });
      recId = created[0].id;
    }
    // sync tag links: delete existing, insert chosen
    await api("DELETE","recipe_tags",`?recipe_id=eq.${recId}`);
    if (formTagIds.length){
      await api("POST","recipe_tags","", formTagIds.map(tid => ({recipe_id: recId, tag_id: tid})));
    }
    closeModal();
    await loadAll();
    showInfo("Saved.");
  } catch (e){
    showErr("Couldn't save. " + e.message);
  } finally {
    saveBtn.disabled = false; saveBtn.innerHTML = orig;
  }
}

async function delRecipe(id){
  if (!confirm("Delete this recipe?")) return;
  try {
    await api("DELETE","recipe_tags",`?recipe_id=eq.${id}`);
    await api("DELETE","recipes",`?id=eq.${id}`);
    if ((location.hash||"").includes("/recipe/")) location.hash = "#/";
    await loadAll();
    showInfo("Deleted.");
  } catch (e){
    showErr("Couldn't delete. " + e.message);
  }
}

/* ================= TAG MANAGER ================= */
function openTagModal(){ renderTagList(); $("tagModalBg").classList.add("show"); }
function closeTagModal(){ $("tagModalBg").classList.remove("show"); $("emojiPickerWrap").innerHTML=""; }

function renderTagList(){
  const box = $("tagList");
  if (!tags.length){ box.innerHTML = `<p class="muted">No tags yet.</p>`; return; }
  box.innerHTML = tags.map(t => `
    <div class="tag-mgr-row" data-row="${t.id}">
      <button class="emoji-btn" type="button" data-emoji-edit="${t.id}">${t.emoji||"🏷"}</button>
      <input type="text" class="grow" value="${esc(t.name)}" data-name="${t.id}" />
      <input type="color" value="${t.color||'#cccccc'}" data-color="${t.id}" />
      <button class="btn-ghost" type="button" data-save-tag="${t.id}">Save</button>
      <button class="btn-del" type="button" data-del-tag="${t.id}">✕</button>
    </div>
    <div data-emojiwrap="${t.id}"></div>
  `).join("");

  box.querySelectorAll("[data-save-tag]").forEach(b => b.onclick = async () => {
    const id = b.dataset.saveTag;
    const name = box.querySelector(`[data-name="${id}"]`).value.trim();
    const color = box.querySelector(`[data-color="${id}"]`).value;
    const emoji = box.querySelector(`[data-emoji-edit="${id}"]`).textContent.trim();
    if (!name) return;
    try { await api("PATCH","tags",`?id=eq.${id}`,{name,color,emoji}); await loadAll(); renderTagList(); showInfo("Tag updated."); }
    catch(e){ showErr("Couldn't update tag. "+e.message); }
  });
  box.querySelectorAll("[data-del-tag]").forEach(b => b.onclick = async () => {
    const id = b.dataset.delTag;
    if (!confirm("Delete this tag? It will be removed from all recipes.")) return;
    try { await api("DELETE","recipe_tags",`?tag_id=eq.${id}`); await api("DELETE","tags",`?id=eq.${id}`); await loadAll(); renderTagList(); showInfo("Tag deleted."); }
    catch(e){ showErr("Couldn't delete tag. "+e.message); }
  });
  box.querySelectorAll("[data-emoji-edit]").forEach(b => b.onclick = () => {
    const id = b.dataset.emojiEdit;
    const wrap = box.querySelector(`[data-emojiwrap="${id}"]`);
    if (wrap.innerHTML){ wrap.innerHTML=""; return; }
    wrap.innerHTML = emojiGridHTML();
    wrap.querySelectorAll("button").forEach(eb => eb.onclick = () => { b.textContent = eb.textContent; wrap.innerHTML=""; });
  });
}

const EMOJI_SET = ["🍅","🌶","🥃","🍸","🍹","🥂","🧊","🍋","🧂","🥓","🌿","🥬","🫒","🧄","🧅","🔥","💀","⭐","💚","💙","❤️","💛","🧪","🏆","👑","🎉","🌊","🥤","🍾","🫑","🦞","🐟","🥚","🫙","🍶","✨"];
function emojiGridHTML(){
  return `<div class="emoji-grid">${EMOJI_SET.map(e=>`<button type="button">${e}</button>`).join("")}</div>`;
}

async function addTag(){
  const name = $("newTagName").value.trim();
  if (!name){ $("newTagName").focus(); return; }
  const color = $("newTagColor").value;
  try {
    await api("POST","tags","", {name, color, emoji: newTagEmoji}, {"Prefer":"return=representation"});
    $("newTagName").value=""; newTagEmoji="🍅"; $("newEmojiBtn").textContent="🍅"; $("emojiPickerWrap").innerHTML="";
    await loadAll(); renderTagList(); showInfo("Tag added.");
  } catch(e){ showErr("Couldn't add tag. "+e.message); }
}

/* ================= WIRE UP ================= */
$("addBtn").onclick = () => { resetForm(); openModal(); };
$("tagsBtn").onclick = openTagModal;
$("cancelBtn").onclick = closeModal;
$("saveBtn").onclick = saveRecipe;
$("tagDoneBtn").onclick = closeTagModal;
$("addTagBtn").onclick = addTag;
$("sort").onchange = renderList;
$("search").oninput = renderList;
$("f-rating").oninput = (e) => { formRating = parseFloat(e.target.value); $("f-rating-out").textContent = fmtScore(formRating); };
$("f-photo").onchange = (e) => { formPhotoFile = e.target.files[0]||null; renderPhotoPreview(); };
$("newEmojiBtn").onclick = () => {
  const wrap = $("emojiPickerWrap");
  if (wrap.innerHTML){ wrap.innerHTML=""; return; }
  wrap.innerHTML = emojiGridHTML();
  wrap.querySelectorAll("button").forEach(eb => eb.onclick = () => { newTagEmoji = eb.textContent; $("newEmojiBtn").textContent = newTagEmoji; wrap.innerHTML=""; });
};
$("modalBg").onclick = (e) => { if (e.target === $("modalBg")) closeModal(); };
$("tagModalBg").onclick = (e) => { if (e.target === $("tagModalBg")) closeTagModal(); };
document.addEventListener("keydown", (e) => { if (e.key==="Escape"){ closeModal(); closeTagModal(); } });

scatterStickers();
loadAll();
</script>
