<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloody Mary Recipe Box</title>
<style>
  :root {
    --bg: #fbf7f4;
    --surface: #ffffff;
    --ink: #2b1a14;
    --muted: #7a6a62;
    --faint: #a89a92;
    --line: #ece3dc;
    --tomato: #c0341d;
    --tomato-dark: #95271a;
    --celery: #4a7c3f;
    --amber: #d98324;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(60,30,20,.07), 0 8px 24px rgba(60,30,20,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 80px; }

  header.app {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .title { display: flex; align-items: center; gap: 12px; }
  .title .glass { font-size: 30px; line-height: 1; }
  h1 { font-size: 25px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .subtitle { color: var(--muted); font-size: 14px; margin: 2px 0 0; }

  button {
    font: inherit; cursor: pointer; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    padding: 9px 14px; transition: all .12s ease;
  }
  button:hover { border-color: #d8ccc3; background: #fff; }
  button:active { transform: scale(.98); }
  .btn-primary {
    background: var(--tomato); color: #fff; border-color: var(--tomato);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--tomato-dark); border-color: var(--tomato-dark); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 6px 8px; }
  .btn-ghost:hover { background: #f0e8e2; color: var(--ink); }
  .btn-danger-text { color: var(--tomato); }

  .toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin: 22px 0 16px;
  }
  .toolbar label { font-size: 13px; color: var(--muted); }
  select, input[type=text], input[type=search], textarea {
    font: inherit; color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
    width: 100%;
  }
  select { width: auto; padding-right: 28px; }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--tomato); box-shadow: 0 0 0 3px rgba(192,52,29,.12);
  }
  .count { margin-left: auto; color: var(--faint); font-size: 13px; }
  .search { flex: 1; min-width: 160px; max-width: 280px; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 18px 20px; margin-bottom: 14px;
  }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
  .card-name { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -.01em; }
  .card-source { color: var(--muted); font-size: 13.5px; margin: 2px 0 0; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 0; }
  .tag {
    font-size: 12px; padding: 3px 10px; border-radius: 999px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .sec-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); margin: 14px 0 4px; font-weight: 700; }
  .card ul { margin: 0; padding-left: 18px; font-size: 14.5px; }
  .card ul li { margin: 2px 0; }
  .card .notes { font-size: 14.5px; margin: 0; white-space: pre-wrap; }
  .card-foot { display: flex; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }

  .stars { white-space: nowrap; display: inline-flex; gap: 2px; }
  .star { cursor: pointer; font-size: 21px; line-height: 1; color: #dcd0c8; user-select: none; transition: transform .08s; }
  .star.on { color: var(--amber); }
  .star:hover { transform: scale(1.15); }

  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .row { display: flex; gap: 12px; }
  .row > .field { flex: 1; }
  .form-actions { display: flex; gap: 8px; margin-top: 6px; }

  .empty { text-align: center; color: var(--faint); padding: 60px 20px; }
  .empty .big { font-size: 44px; }
  .empty p { margin: 12px 0 0; }

  .banner {
    border-radius: 10px; padding: 11px 14px; font-size: 13.5px; margin-bottom: 16px;
    display: none;
  }
  .banner.show { display: block; }
  .banner.err { background: #fdecea; color: #a3261d; border: 1px solid #f5c6c0; }
  .banner.info { background: #eef5ea; color: #3b6d11; border: 1px solid #d4e5c6; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(43,26,20,.45);
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; overflow-y: auto; z-index: 50;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    width: 100%; max-width: 520px; padding: 24px;
  }
  .modal h2 { margin: 0 0 16px; font-size: 19px; }

  @media (max-width: 480px) {
    .row { flex-direction: column; gap: 0; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="title">
      <span class="glass">🍅</span>
      <div>
        <h1>Bloody Mary Recipe Box</h1>
        <p class="subtitle">Our shared collection &amp; rankings</p>
      </div>
    </div>
    <button class="btn-primary" id="addBtn">+ Add recipe</button>
  </header>

  <div class="banner err" id="errBanner"></div>
  <div class="banner info" id="infoBanner"></div>

  <div class="toolbar">
    <label for="sort">Sort by</label>
    <select id="sort">
      <option value="rating">Highest rated</option>
      <option value="name">Name (A–Z)</option>
      <option value="recent">Recently added</option>
    </select>
    <input type="search" class="search" id="search" placeholder="Search recipes…" />
    <span class="count" id="count"></span>
  </div>

  <div id="list"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Add recipe</h2>
    <div class="field">
      <label for="f-name">Recipe name *</label>
      <input type="text" id="f-name" placeholder="e.g. Smoky chipotle mary" />
    </div>
    <div class="row">
      <div class="field">
        <label for="f-source">Source / who made it</label>
        <input type="text" id="f-source" placeholder="e.g. The Wharf, or Mum" />
      </div>
      <div class="field">
        <label for="f-spice">Spice level</label>
        <select id="f-spice" style="width:100%">
          <option value="">—</option>
          <option>Mild</option>
          <option>Medium</option>
          <option>Hot</option>
          <option>Inferno</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="f-ingredients">Ingredients (one per line)</label>
      <textarea id="f-ingredients" rows="4" placeholder="50ml vodka&#10;100ml tomato juice&#10;Dash of Worcestershire…"></textarea>
    </div>
    <div class="field">
      <label for="f-notes">Notes / garnish</label>
      <textarea id="f-notes" rows="2" placeholder="Garnish, tweaks, verdict…"></textarea>
    </div>
    <div class="field">
      <label>Rating</label>
      <div class="stars" id="f-rating"></div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="saveBtn">Save</button>
      <button id="cancelBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — paste your two Supabase values here (see SETUP.md)
   ============================================================ */
const SUPABASE_URL = "https://zbwydzxeadxjlzpjntpu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6oLX612RoEj_T9o5keYEDw_HOrKc8fh";
/* ============================================================ */

const TABLE = "recipes";
const apiBase = () => `${SUPABASE_URL}/rest/v1/${TABLE}`;
const headers = () => ({
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json"
});

let recipes = [];
let editingId = null;
let formRating = 0;

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function showErr(msg){ const b=$("errBanner"); b.textContent=msg; b.classList.add("show"); }
function hideErr(){ $("errBanner").classList.remove("show"); }
function showInfo(msg){ const b=$("infoBanner"); b.textContent=msg; b.classList.add("show"); setTimeout(()=>b.classList.remove("show"), 3000); }

function configured(){
  return SUPABASE_URL.startsWith("http") && !SUPABASE_ANON_KEY.startsWith("PASTE_");
}

async function api(method, path="", body=null, extraHeaders={}){
  const opts = { method, headers: { ...headers(), ...extraHeaders } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(apiBase() + path, opts);
  if (!res.ok){
    const text = await res.text();
    throw new Error(`${res.status}: ${text}`);
  }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadRecipes(){
  if (!configured()){
    showErr("Not connected yet. Open SETUP.md and paste your Supabase URL and key into index.html.");
    render();
    return;
  }
  try {
    hideErr();
    recipes = await api("GET", "?select=*") || [];
    render();
  } catch (e){
    showErr("Couldn't load recipes. Check your setup, or the project may be paused — open the Supabase dashboard to resume it. (" + e.message + ")");
    render();
  }
}

/* ---------- Rendering ---------- */
const SPICE_STYLE = {
  Mild:    "background:#eaf3de;color:#27500a",
  Medium:  "background:#faeeda;color:#633806",
  Hot:     "background:#faece7;color:#712b13",
  Inferno: "background:#fcebeb;color:#791f1f"
};

function starsHTML(n, id){
  let h = "";
  for (let i=1;i<=5;i++){
    h += `<span class="star ${i<=n?'on':''}" data-star="${i}" ${id?`data-id="${id}"`:''} role="button" aria-label="${i} star">${i<=n?'★':'☆'}</span>`;
  }
  return h;
}

function render(){
  const sort = $("sort").value;
  const q = $("search").value.trim().toLowerCase();
  let view = recipes.slice();

  if (q){
    view = view.filter(r =>
      (r.name||"").toLowerCase().includes(q) ||
      (r.source||"").toLowerCase().includes(q) ||
      (r.ingredients||"").toLowerCase().includes(q)
    );
  }
  if (sort==="rating") view.sort((a,b)=>(b.rating||0)-(a.rating||0) || (b.created_at||"").localeCompare(a.created_at||""));
  else if (sort==="name") view.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  else view.sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));

  $("count").textContent = recipes.length + (recipes.length===1?" recipe":" recipes");

  const list = $("list");
  if (recipes.length===0){
    list.innerHTML = `<div class="empty"><div class="big">🍸</div><p>No recipes yet.<br>Add your first one to get started.</p></div>`;
    return;
  }
  if (view.length===0){
    list.innerHTML = `<div class="empty"><p>No recipes match “${esc(q)}”.</p></div>`;
    return;
  }

  list.innerHTML = view.map(r => {
    const ing = (r.ingredients||"").split("\n").map(s=>s.trim()).filter(Boolean);
    const ingHTML = ing.length ? `<div class="sec-label">Ingredients</div><ul>${ing.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>` : "";
    const notesHTML = r.notes ? `<div class="sec-label">Notes</div><p class="notes">${esc(r.notes)}</p>` : "";
    const spice = r.spice ? `<span class="tag" style="${SPICE_STYLE[r.spice]||''}">🌶 ${esc(r.spice)}</span>` : "";
    return `<div class="card">
      <div class="card-head">
        <div>
          <p class="card-name">${esc(r.name||"Untitled")}</p>
          ${r.source?`<p class="card-source">${esc(r.source)}</p>`:""}
        </div>
        <div class="stars">${starsHTML(r.rating||0, r.id)}</div>
      </div>
      ${spice?`<div class="tags">${spice}</div>`:""}
      ${ingHTML}${notesHTML}
      <div class="card-foot">
        <button class="btn-ghost" data-edit="${r.id}">✎ Edit</button>
        <button class="btn-ghost btn-danger-text" data-del="${r.id}">🗑 Delete</button>
      </div>
    </div>`;
  }).join("");

  list.querySelectorAll("[data-del]").forEach(b => b.onclick = () => delRecipe(b.dataset.del));
  list.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => startEdit(b.dataset.edit));
  list.querySelectorAll(".card .star[data-id]").forEach(s => {
    s.onclick = () => {
      const r = recipes.find(x => String(x.id)===String(s.dataset.id));
      if (!r) return;
      const val = parseInt(s.dataset.star);
      rate(r, r.rating===val ? val-1 : val);
    };
  });
}

/* ---------- Form / modal ---------- */
function renderFormStars(){
  $("f-rating").innerHTML = starsHTML(formRating);
  $("f-rating").querySelectorAll(".star").forEach(s => {
    s.onclick = () => { formRating = parseInt(s.dataset.star); renderFormStars(); };
  });
}
function openModal(){ $("modalBg").classList.add("show"); }
function closeModal(){ $("modalBg").classList.remove("show"); resetForm(); }
function resetForm(){
  editingId = null; formRating = 0;
  ["f-name","f-source","f-ingredients","f-notes"].forEach(i => $(i).value = "");
  $("f-spice").value = "";
  $("modalTitle").textContent = "Add recipe";
  renderFormStars();
}
function startEdit(id){
  const r = recipes.find(x => String(x.id)===String(id));
  if (!r) return;
  editingId = id; formRating = r.rating||0;
  $("f-name").value = r.name||"";
  $("f-source").value = r.source||"";
  $("f-spice").value = r.spice||"";
  $("f-ingredients").value = r.ingredients||"";
  $("f-notes").value = r.notes||"";
  $("modalTitle").textContent = "Edit recipe";
  renderFormStars(); openModal();
}

/* ---------- CRUD ---------- */
async function saveRecipe(){
  const name = $("f-name").value.trim();
  if (!name){ $("f-name").focus(); return; }
  const data = {
    name,
    source: $("f-source").value.trim(),
    spice: $("f-spice").value || null,
    ingredients: $("f-ingredients").value.trim(),
    notes: $("f-notes").value.trim(),
    rating: formRating
  };
  try {
    if (editingId){
      await api("PATCH", `?id=eq.${editingId}`, data);
      const r = recipes.find(x => String(x.id)===String(editingId));
      if (r) Object.assign(r, data);
    } else {
      const created = await api("POST", "", data, { "Prefer": "return=representation" });
      if (created && created[0]) recipes.push(created[0]);
    }
    closeModal(); render(); showInfo("Saved.");
  } catch (e){
    showErr("Couldn't save. " + e.message);
  }
}

async function delRecipe(id){
  if (!confirm("Delete this recipe?")) return;
  try {
    await api("DELETE", `?id=eq.${id}`);
    recipes = recipes.filter(r => String(r.id)!==String(id));
    render(); showInfo("Deleted.");
  } catch (e){
    showErr("Couldn't delete. " + e.message);
  }
}

async function rate(r, val){
  const prev = r.rating;
  r.rating = val; render();
  try {
    await api("PATCH", `?id=eq.${r.id}`, { rating: val });
  } catch (e){
    r.rating = prev; render();
    showErr("Couldn't update rating. " + e.message);
  }
}

/* ---------- Wire up ---------- */
$("addBtn").onclick = () => { resetForm(); openModal(); };
$("cancelBtn").onclick = closeModal;
$("saveBtn").onclick = saveRecipe;
$("sort").onchange = render;
$("search").oninput = render;
$("modalBg").onclick = (e) => { if (e.target === $("modalBg")) closeModal(); };
document.addEventListener("keydown", (e) => { if (e.key==="Escape") closeModal(); });

renderFormStars();
loadRecipes();
</script>
</body>
</html>
